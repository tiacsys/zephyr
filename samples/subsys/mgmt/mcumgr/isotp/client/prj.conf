# --- Logging / console ---
CONFIG_LOG=y
CONFIG_MCUMGR_TRANSPORT_ISOTP_LOG_LEVEL_DBG=y

# --- CAN + ISO-TP ---
CONFIG_CAN=y
CONFIG_ISOTP=y

# --- MCUmgr SMP client ---
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_SMP_CLIENT=y

# ISO-TP (CAN) transport. The IDs are the mirror image of the server: the
# client transmits SMP data on the server's RX id (0x80) and receives on the
# server's TX id (0x180). Flow-control uses separate identifiers, also mirrored
# (the client's TX/RX flow-control ids are the server's RX/TX flow-control ids).
CONFIG_MCUMGR_TRANSPORT_ISOTP=y
CONFIG_MCUMGR_TRANSPORT_ISOTP_RX_ID=0x180
CONFIG_MCUMGR_TRANSPORT_ISOTP_TX_ID=0x80
CONFIG_MCUMGR_TRANSPORT_ISOTP_TX_FC_ID=0x580
CONFIG_MCUMGR_TRANSPORT_ISOTP_RX_FC_ID=0x480

# OS management client (provides os_mgmt_client_echo()).
CONFIG_MCUMGR_GRP_OS_CLIENT=y
CONFIG_MCUMGR_GRP_OS_CLIENT_ECHO=y

# Larger thread stacks for the system / mcumgr work queues on native_sim.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4096
