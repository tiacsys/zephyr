# --- Console / interactive shell ---
CONFIG_LOG=y
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_MCUMGR_TRANSPORT_ISOTP_LOG_LEVEL_INF=y

# --- CAN + ISO-TP ---
CONFIG_CAN=y
CONFIG_ISOTP=y

# --- MCUmgr SMP client ---
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_SMP_CLIENT=y

# ISO-TP (CAN) transport. The default data IDs mirror the server sample (server
# RX 0x80 / TX 0x180), so this build talks to the stock server out of the box.
# Flow-control IDs are mirrored too. Select a different node at runtime with
# "smpc isotp target <rx_id> <tx_id>"; the flow-control IDs stay shared.
CONFIG_MCUMGR_TRANSPORT_ISOTP=y
CONFIG_MCUMGR_TRANSPORT_ISOTP_RX_ID=0x180
CONFIG_MCUMGR_TRANSPORT_ISOTP_TX_ID=0x80
CONFIG_MCUMGR_TRANSPORT_ISOTP_TX_FC_ID=0x580
CONFIG_MCUMGR_TRANSPORT_ISOTP_RX_FC_ID=0x480

# The "smpc" SMP client shell + its ISO-TP backend ("smpc isotp"). The base
# shell provides echo/reset/transport; with FILE_SYSTEM enabled below, the
# image, image-upload/upgrade and file command groups
# (MCUMGR_SMP_CLIENT_SHELL_IMG/_IMG_UPLOAD/_FILE, all default y) come in too,
# pulling the image management client and the MCUboot bootutil library. The
# ISO-TP backend defaults on when the transport is enabled. We push images to
# remote nodes, not boot them here.
CONFIG_IMG_MANAGER=n
CONFIG_MCUMGR_SMP_CLIENT_SHELL=y

# Local file system: firmware images and files to push to nodes are read from
# /lfs (littlefs). The built-in "fs" shell stages/inspects files there.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_SHELL=y

# Thread stacks for the system / mcumgr work queues.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4096
