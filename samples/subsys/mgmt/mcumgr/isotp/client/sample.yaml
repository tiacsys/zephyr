sample:
  name: MCUmgr ISO-TP (CAN) SMP client shell
  description: >
    Interactive "smpc" shell that drives MCUmgr image, OS and file management
    over the ISO-TP (CAN, ISO 15765-2) transport to perform firmware updates on
    remote nodes, with runtime peer retargeting and a littlefs image source.
common:
  tags:
    - mcumgr
    - smp
    - canbus
    - isotp
  # Interactive sample: it needs a CAN bus and a live SMP server/node to do
  # anything, so it is build-only under twister rather than self-verifying.
  build_only: true
tests:
  sample.mgmt.mcumgr.smp.isotp.client:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    depends_on:
      - can
