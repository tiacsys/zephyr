# Plain native_sim has no MCUboot/code partition (no FLASH_LOAD_OFFSET), so the
# image management server group cannot be built; this build answers OS/stat
# commands (echo etc.) for the client sample over vcan0.
CONFIG_MCUMGR_GRP_IMG=n
CONFIG_IMG_MANAGER=n
CONFIG_MCUBOOT_SHELL=n
