# --- Logging / console ---
CONFIG_LOG=y
CONFIG_MCUMGR_TRANSPORT_ISOTP_LOG_LEVEL_DBG=y

# --- CAN + ISO-TP ---
CONFIG_CAN=y
CONFIG_ISOTP=y

# --- MCUmgr SMP server ---
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y

# ISO-TP (CAN) transport. RX/TX IDs are the defaults (0x80 / 0x180); the client
# must use the mirror image of these (TX 0x80 / RX 0x180).
CONFIG_MCUMGR_TRANSPORT_ISOTP=y

# Management groups exposed by this server.
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_ECHO=y
CONFIG_MCUMGR_GRP_OS_INFO=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_STAT=y

# Larger thread stacks for the system / mcumgr work queues on native_sim.
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4096

CONFIG_SHELL=y
CONFIG_MCUBOOT_SHELL=y
